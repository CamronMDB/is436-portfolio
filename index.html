
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camron Mekhi Headen | Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Mate+SC&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F5F0D8;
      --orange: #C0460A;
      --dark: #2B1D0E;
      --tan: #D4A97A;
      --footer-bg: #E8E0C0;
    }
 
    body {
      background-color: var(--cream);
      font-family: 'Mate SC', serif;
      color: var(--dark);
      margin: 0;
    }
 
    /* ── Navbar── */
    .navbar {
      background-color: var(--cream);
      padding: 14px 24px;
    }
 
    .navbar-brand {
      background-color: var(--orange);
      color: white !important;
      font-family: 'Mate SC', serif;
      font-size: 1.3rem;
      padding: 10px 22px;
      border: 3px solid #4a90d9;
      text-decoration: none;
      letter-spacing: 1px;
    }
 
    .nav-link {
      background-color: var(--orange) !important;
      color: white !important;
      font-family: 'Mate SC', serif;
      font-size: 1rem;
      padding: 10px 28px !important;
      margin-left: 10px;
      letter-spacing: 1px;
      text-decoration: none;
      transition: background 0.2s;
    }
 
    .nav-link:hover {
      background-color: var(--dark) !important;
    }
 
    /* ── MAIN CONTENT ── */
    .main-content {
      padding: 20px 24px 10px;
    }
 
    .image-card {
      border: 2px solid var(--dark);
      background-color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      height: 100%;
      min-height: 450px;
    }
 
    .profile-circle {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background-color: var(--tan);
      border: 3px solid var(--dark);
    }
 
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
    }
 
    .name-card {
      border: 2px solid var(--dark);
      background-color: var(--cream);
      padding: 24px 28px;
    }
 
    .hero-name {
      font-family: 'Mate SC', serif;
      font-size: 1.8rem;
      color: var(--dark);
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--dark);
    }
 
    .hero-welcome {
      font-family: 'Mate SC', serif;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--dark);
      margin: 0;
    }
 
    .view-work-card {
      border: 2px solid var(--orange);
      background-color: var(--cream);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 200px;
      text-decoration: none;
      transition: background 0.2s;
    }
 
    .view-work-card:hover {
      background-color: var(--orange);
    }
 
    .view-work-card:hover .view-work-text,
    .view-work-card:hover .view-work-arrow {
      color: white;
    }
 
    .view-work-text {
      font-family: 'Mate SC', serif;
      font-size: 1.4rem;
      color: var(--orange);
    }
 
    .view-work-arrow {
      font-size: 2rem;
      color: var(--orange);
      text-align: right;
      display: block;
    }
 
    .btn-lets-work {
      background-color: var(--orange);
      color: white;
      font-family: 'Mate SC', serif;
      font-size: 1.1rem;
      padding: 14px 32px;
      border: 3px solid var(--dark);
      letter-spacing: 1px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
      transition: background 0.2s;
    }
 
    .btn-lets-work:hover {
      background-color: var(--dark);
      color: white;
    }
 
    /* ──Footer── */
    .contact-footer {
      background-color: var(--footer-bg);
      border-top: 2px solid var(--dark);
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
    }
 
    .contact-footer p {
      margin: 2px 0;
      font-family: 'Mate SC', serif;
      font-size: 0.9rem;
      color: var(--dark);
    }
 
    .social-icons a { margin-left: 12px; }
 
    .social-icons svg {
      width: 40px;
      height: 40px;
      fill: var(--dark);
      transition: fill 0.2s;
    }
 
    .social-icons a:hover svg { fill: var(--orange); }
 
    @media (max-width: 768px) {
      .main-content { padding: 12px; }
      .profile-circle { width: 200px; height: 200px; }
      .image-card { min-height: 280px; }
      .contact-footer { flex-direction: column; gap: 16px; text-align: center; }
      .nav-link { margin-left: 0; margin-top: 4px; }
    }
  </style>
</head>

    </div>

      </div>

    </div>

    </div>
    <div class="social-icons d-flex align-items-center">
